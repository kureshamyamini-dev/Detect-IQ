<!DOCTYPE html>
<html>
<head>
<title>Insurance Fraud Detection</title>
</head>

<body>

<h1>Insurance Fraud Detection System</h1>

<label>Claim Amount</label>
<input type="number" id="claim"><br><br>

<label>Previous Claims</label>
<input type="number" id="previous"><br><br>

<button onclick="checkFraud()">Check Fraud</button>

<h2 id="result"></h2>

<script>

function checkFraud(){

let claim=document.getElementById("claim").value
let previous=document.getElementById("previous").value

fetch("http://127.0.0.1:5000/predict",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
claim:claim,
previous:previous
})

})

.then(res=>res.json())
.then(data=>{
document.getElementById("result").innerText=data.result
})

}

</script>

</body>
</html>
